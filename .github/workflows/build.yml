name: Build Test

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: sc-docs-v1

      - name: Checkout sc-docs
        uses: actions/checkout@v6
        with:
          repository: spacecubics/sc-docs
          path: sc-docs

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Antora
        run: npm install antora

      - name: Print Node and Antora version
        run: |
          npx node --version
          npx antora --version

      - name: Build it
        working-directory: sc-docs
        run: |
          npx antora generate --log-failure-level warn antora-playbook-v1-local.yml
